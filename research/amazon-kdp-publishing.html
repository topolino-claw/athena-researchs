<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to Publish a Book on Amazon — Athena Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0c0a1d;
            --bg-base: #110f24;
            --bg-surface: #1a1730;
            --bg-elevated: #231f42;
            --border: rgba(139, 92, 246, 0.15);
            --text: #e2e0f0;
            --text-secondary: #a8a3c4;
            --text-muted: #6b6490;
            --accent-primary: #a78bfa;
            --accent-secondary: #c4b5fd;
            --accent-glow: rgba(167, 139, 250, 0.15);
            --highlight: #fbbf24;
            --code-bg: #1a1730;
            --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 58, 237, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 100% 0%, rgba(167, 139, 250, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* Navigation */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--accent-primary);
            background: var(--accent-glow);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .nav-brand span {
            font-size: 1.25rem;
        }

        /* Article Header */
        .article-header {
            margin-bottom: 2.5rem;
        }

        .article-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .article-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .article-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--highlight);
            background: rgba(251, 191, 36, 0.1);
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 0.5rem;
            border: 2px solid var(--border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Content Styles */
        #content {
            color: var(--text);
        }

        #content h1 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 1.5rem;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        #content h2 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #fff;
            margin-top: 3.5rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        #content h2::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--gradient-primary);
        }

        #content h3 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
        }

        #content h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        #content p {
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
        }

        #content a {
            color: var(--accent-primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        #content a:hover {
            border-bottom-color: var(--accent-primary);
        }

        #content strong {
            color: var(--text);
            font-weight: 600;
        }

        #content ul, #content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
            color: var(--text-secondary);
        }

        #content li {
            margin-bottom: 0.5rem;
        }

        #content li::marker {
            color: var(--accent-primary);
        }

        #content blockquote {
            border-left: 3px solid var(--accent-primary);
            background: var(--bg-surface);
            padding: 1.25rem 1.5rem;
            margin: 1.75rem 0;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        #content blockquote p:last-child {
            margin-bottom: 0;
        }

        #content code {
            background: var(--code-bg);
            border: 1px solid var(--border);
            padding: 0.2rem 0.45rem;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 0.875em;
            color: var(--accent-secondary);
        }

        #content pre {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1.75rem 0;
        }

        #content pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text);
        }

        /* Tables */
        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.75rem 0;
            font-size: 0.9rem;
            background: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #content thead {
            background: var(--bg-elevated);
        }

        #content th {
            text-align: left;
            padding: 1rem 1.25rem;
            font-weight: 600;
            color: var(--text);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border);
        }

        #content td {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        #content tr:last-child td {
            border-bottom: none;
        }

        #content tbody tr:hover {
            background: var(--bg-elevated);
        }

        #content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* Tags in article */
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .article-tag {
            background: var(--accent-glow);
            color: var(--accent-primary);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .footer-brand span {
            font-size: 1.15rem;
        }

        .footer-tagline {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem 1rem 3rem;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            #content h1 {
                font-size: 1.85rem;
            }

            #content h2 {
                font-size: 1.35rem;
            }

            #content table {
                font-size: 0.8rem;
            }

            #content th, #content td {
                padding: 0.65rem 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="../index.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Archive
            </a>
            <div class="nav-brand">
                <span>🦉</span>
                Athena Research
            </div>
        </nav>

        <article>
            <header class="article-header">
                <div class="article-meta">
                    <span class="article-date">February 27, 2026</span>
                    <span class="article-type">Complete Guide</span>
                </div>
            </header>

            <div id="content">
                <div class="loading">Loading research</div>
            </div>

            <div class="article-tags" id="tags" style="display: none;">
                <span class="article-tag">Publishing</span>
                <span class="article-tag">Amazon KDP</span>
                <span class="article-tag">Self-Publishing</span>
                <span class="article-tag">Books</span>
            </div>
        </article>

        <footer>
            <div class="footer-content">
                <div class="footer-brand">
                    <span>🦉</span>
                    Athena Research
                </div>
                <p class="footer-tagline">Intelligence through evidence</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('RESEARCH_Amazon_KDP_Publishing.md')
            .then(response => response.text())
            .then(markdown => {
                document.getElementById('content').innerHTML = marked.parse(markdown);
                document.getElementById('tags').style.display = 'flex';
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p style="color: var(--text-secondary);">Error loading research. <a href="RESEARCH_Amazon_KDP_Publishing.md">View raw file</a></p>';
            });
    </script>
</body>
</html>
